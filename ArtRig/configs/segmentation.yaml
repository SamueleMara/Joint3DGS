window:
  size: 8
  stride: 4

tracks:
  min_valid_ratio: 0.7
  max_depth: 3.0

features:
  model_name: "vit_small_patch14_dinov2"
  num_neighbors: 16
  spatial_gate_px: 48

loss:
  lambda_motion: 1.0
  lambda_smooth: 0.5
  lambda_canrigid: 1.0
  lambda_pair: 0.6
  lambda_cog: 0.4
  lambda_ent: 0.0
  lambda_balance: 0.2
  normalize_terms: true
  normalize_beta: 0.9
  normalize_eps: 1e-6
  normalize_max_scale: 100.0
  pair_margin: 0.01
  pair_lambda_sep: 1.0

optimizer:
  lr_logits: 1e-2
  lr_twists: 1e-4
  iterations: 300
  grad_clip: 1.0
  schedule:
    warmup_iters: 40
    canrigid_start_iter: 40
    pair_start_iter: 80
    cog_start_iter: 120
    entropy_decay_start: 40
    entropy_decay_end: 160

sampling:
  num_pairs: 4096
