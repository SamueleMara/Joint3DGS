io:
  rgb_dir: "images"
  depth_dir: "depth"
  mask_dir: "fg_mask"
  intrinsics_file: "intrinsics.npy"
  extrinsics_file: "extrinsics.npy"
  cameras_json: "metadata/cameras.json"
  depth_scale: 1.0
  depth_npy_scale: 1.0

matcher:
  backend: "omniglue"   # omniglue | lightglue | descriptor
  backend_callable: ""   # optional module:function from external submodule
  repo_path: ""          # optional path to backend repo
  min_confidence: 0.2
  max_matches: 2048

features:
  model_name: "vit_small_patch14_dinov2"
  device: "cpu"
  repo_path: ""
  detector: "shi_tomasi"
  detector_kwargs:
    quality_level: 0.01
    min_distance: 4.0
    block_size: 5
  num_keypoints: 1024
  fg_erode_px: 3

filtering:
  same_time_max_3d_error: 0.01
  min_match_confidence: 0.2
  max_pixel_jump: 80.0
  max_depth_jump: 0.3
  require_cycle_consistency: false

  min_component_obs: 2
  min_track_length: 4
  min_valid_ratio: 0.5
  min_track_confidence: null

multiview:
  alpha_world: 1.0
  alpha_reproj: 0.5
  alpha_feat: 0.2
  max_mean_score: 0.02
  min_multiview_support_ratio: 0.4
  enable_cross_time_multiview: false
