device: cuda
dtype: float32
seed: 0

video:
  resize_long_edge: 640
  max_frames: 48
  stride: 6

da3:
  enabled: true
  checkpoint: null
  model_name: depth-anything/DA3-LARGE-1.1
  batch_size: 1
  window_size: 16
  stride: 8
  mixed_precision: true
  use_ray_pose: true
  ref_view_strategy: middle
  process_res: 448
  process_res_method: upper_bound_resize
  oom_retry_process_res: [392, 336, 280]
  sequence_chunk_size: 12
  sequence_chunk_overlap: 0
  allow_mock: false

geometry:
  pair_offsets: [-4, -2, -1, 1, 2, 4]
  alpha_3d: 1.2
  alpha_flow: 1.1
  alpha_depth: 0.7
  alpha_rgb: 0.2
  alpha_cycle: 0.7
  alpha_vis: 1.0
  seed_threshold_high: 0.9
  temporal_smoothing_alpha: 0.3
  static_threshold_low: 0.15
  flow_consistency_thresh: 1.5
  occlusion_abs_tol: 0.04
  occlusion_rel_tol: 0.08

sam3:
  enabled: true
  checkpoint: null
  model_id: null
  version: sam3.1
  resize_long_edge: 384
  gpus_to_use: null
  offload_video_to_cpu: true
  offload_state_to_cpu: true
  async_loading_frames: false
  max_regions_per_frame: 6
  max_prompt_frames: 1
  points_per_region: 3
  negative_ring: 7
  allow_mock: false

fusion:
  enabled: true
  base_channels: 48
  lr: 0.0005
  batch_size: 2
  epochs_per_outer_iter: 4
  w_sam: 1.0
  w_geo: 1.25
  w_static_seed: 0.7
  w_dynamic_seed: 1.3
  w_tv: 0.03
  w_temp: 0.2
  w_abs_motion: 0.55
  w_motion_rank: 0.3
  w_contrastive: 0.35
  w_pair_3d_contrastive: 0.45
  contrastive_pairs: 1536
  contrastive_neighbor_radius: 7
  contrastive_beta: 10.0
  pairwise_num_pairs: 3072
  pairwise_rel_scale: 12.0
  pairwise_abs_scale: 5.0
  pairwise_min_visibility: 0.2
  dynamic_geo_high: 0.52
  dynamic_sam_high: 0.4
  static_geo_low: 0.1
  static_sam_low: 0.06
  min_vis_dynamic: 0.15
  min_vis_static: 0.5
  export_dynamic_threshold: 0.42
  export_neighbor_threshold: 0.3
  export_point_stride: 6
  export_max_points: 120000
  backward_propagation_decay: 0.94
  backward_propagation_iters: 3

pose_refine:
  enabled: true
  lr: 0.00005
  steps: 60
  lambda_depth: 0.5
  lambda_rgb: 0.1
  lambda_temporal_translation: 0.01
  lambda_temporal_rotation: 0.005
  lambda_pose_anchor: 0.002
  keyframe_only: false
  keyframe_stride: 4
  camera_mode: fixed
  auto_static_translation_thresh: 0.001
  auto_static_rotation_thresh_deg: 0.1
  fallback_to_cpu_on_cuda_error: true

pose_init:
  enabled: true
  max_corners: 2000
  quality_level: 0.01
  min_distance: 7.0
  pnp_reprojection_error: 3.0
  min_inliers: 32
  camera_mode: fixed
  static_check_pairs: 8
  static_motion_median_px: 0.4

pipeline:
  num_outer_iters: 1
  save_debug_every_iter: false
  rerun_segmentation_each_iter: false
